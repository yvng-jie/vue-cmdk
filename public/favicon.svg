  <line x1="61" y1="56" x2="72" y2="67" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- List line 1 -->
  <line x1="32" y1="72" x2="48" y2="72" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- List line 2 -->
  <line x1="52" y1="72" x2="68" y2="72" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
